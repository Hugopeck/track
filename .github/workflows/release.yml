name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-pr-metadata:
    name: Release PR metadata
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_number: ${{ steps.metadata.outputs.pr_number }}
      head_ref: ${{ steps.metadata.outputs.head_ref }}
      head_sha: ${{ steps.metadata.outputs.head_sha }}
      base_sha: ${{ steps.metadata.outputs.base_sha }}
      pr_title: ${{ steps.metadata.outputs.pr_title }}
      pr_body: ${{ steps.metadata.outputs.pr_body }}
      pr_labels: ${{ steps.metadata.outputs.pr_labels }}
    steps:
      - id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_json="$({ gh api "repos/${GITHUB_REPOSITORY}/pulls?state=open&head=${GITHUB_REPOSITORY_OWNER}:release-please--branches--main" | jq '.[0] // empty'; } || true)"

          if [[ -z "$pr_json" ]]; then
            exit 0
          fi

          echo "pr_number=$(printf '%s' "$pr_json" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(printf '%s' "$pr_json" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(printf '%s' "$pr_json" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(printf '%s' "$pr_json" | jq -r '.base.sha')" >> "$GITHUB_OUTPUT"
          echo "pr_title=$(printf '%s' "$pr_json" | jq -r '.title')" >> "$GITHUB_OUTPUT"
          echo "pr_labels=$(printf '%s' "$pr_json" | jq -r '[.labels[].name] | join(",")')" >> "$GITHUB_OUTPUT"
          {
            echo 'pr_body<<EOF'
            printf '%s\n' "$(printf '%s' "$pr_json" | jq -r '.body // ""')"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  release-pr-track-validate:
    name: Release PR Track Validate
    needs: release-pr-metadata
    if: ${{ needs.release-pr-metadata.outputs.head_sha != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - name: Mark Track Validate pending
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.release-pr-metadata.outputs.head_sha }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state=pending \
            -f context='Track Validate' \
            -f description='Running from Release workflow' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-pr-metadata.outputs.head_sha }}

      - name: Validate release PR Track state
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_HEAD_REF: ${{ needs.release-pr-metadata.outputs.head_ref }}
          PR_TITLE: ${{ needs.release-pr-metadata.outputs.pr_title }}
          PR_BODY: ${{ needs.release-pr-metadata.outputs.pr_body }}
          PR_LABELS: ${{ needs.release-pr-metadata.outputs.pr_labels }}
        run: bash .track/scripts/track-validate.sh

      - name: Mark Track Validate success
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.release-pr-metadata.outputs.head_sha }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state=success \
            -f context='Track Validate' \
            -f description='Passed from Release workflow' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Mark Track Validate failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.release-pr-metadata.outputs.head_sha }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state=failure \
            -f context='Track Validate' \
            -f description='Failed from Release workflow' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  release-pr-track-pr-lint:
    name: Release PR Track PR Lint
    needs: release-pr-metadata
    if: ${{ needs.release-pr-metadata.outputs.head_sha != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - name: Mark Track PR Lint pending
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.release-pr-metadata.outputs.head_sha }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state=pending \
            -f context='Track PR Lint' \
            -f description='Running from Release workflow' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-pr-metadata.outputs.head_sha }}

      - name: Lint release PR branch and title
        env:
          GITHUB_HEAD_REF: ${{ needs.release-pr-metadata.outputs.head_ref }}
          PR_TITLE: ${{ needs.release-pr-metadata.outputs.pr_title }}
          PR_BODY: ${{ needs.release-pr-metadata.outputs.pr_body }}
          PR_LABELS: ${{ needs.release-pr-metadata.outputs.pr_labels }}
          PR_NUMBER: ${{ needs.release-pr-metadata.outputs.pr_number }}
        run: bash .track/scripts/track-pr-lint.sh

      - name: Mark Track PR Lint success
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.release-pr-metadata.outputs.head_sha }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state=success \
            -f context='Track PR Lint' \
            -f description='Passed from Release workflow' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Mark Track PR Lint failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.release-pr-metadata.outputs.head_sha }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state=failure \
            -f context='Track PR Lint' \
            -f description='Failed from Release workflow' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

  release-pr-conventional-commit-lint:
    name: Release PR conventional-commit-lint
    needs: release-pr-metadata
    if: ${{ needs.release-pr-metadata.outputs.head_sha != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    steps:
      - name: Mark conventional-commit-lint pending
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.release-pr-metadata.outputs.head_sha }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state=pending \
            -f context='conventional-commit-lint' \
            -f description='Running from Release workflow' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-pr-metadata.outputs.head_sha }}

      - name: Lint release PR commit messages
        env:
          BASE_SHA: ${{ needs.release-pr-metadata.outputs.base_sha }}
          HEAD_SHA: ${{ needs.release-pr-metadata.outputs.head_sha }}
        run: bash .track/scripts/track-conventional-commit-lint.sh

      - name: Mark conventional-commit-lint success
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.release-pr-metadata.outputs.head_sha }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state=success \
            -f context='conventional-commit-lint' \
            -f description='Passed from Release workflow' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Mark conventional-commit-lint failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.release-pr-metadata.outputs.head_sha }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state=failure \
            -f context='conventional-commit-lint' \
            -f description='Failed from Release workflow' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
