name: Track Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Track Validate
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Track state
        run: bash .track/scripts/track-validate.sh
