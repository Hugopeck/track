name: Conventional Commit Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            ci
            test
            refactor
            perf
            style
            build
            revert
          scopes: |
            skills
            scripts
            init
            work
            create
            decompose
            validate
            todo
            release
            config
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a description after the type/scope prefix"
