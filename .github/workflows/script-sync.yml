name: Script Sync Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-script-sync:
    name: Verify .track/scripts/ matches scaffold/track/scripts/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diff .track/scripts/ against scaffold/track/scripts/
        run: |
          drift=0
          for script in .track/scripts/track-*.sh .track/scripts/track-common.sh; do
            name="$(basename "$script")"
            scaffold="skills/init/scaffold/track/scripts/$name"
            if [[ ! -f "$scaffold" ]]; then
              printf '::error::Missing scaffold copy: %s\n' "$scaffold"
              drift=1
              continue
            fi
            if ! diff -q "$script" "$scaffold" >/dev/null 2>&1; then
              printf '::error::%s and %s have diverged:\n' "$script" "$scaffold"
              diff --unified=3 "$script" "$scaffold" || true
              drift=1
            fi
          done
          # Check reverse: scaffold scripts missing from .track/scripts/
          for scaffold in skills/init/scaffold/track/scripts/track-*.sh skills/init/scaffold/track/scripts/track-common.sh; do
            name="$(basename "$scaffold")"
            script=".track/scripts/$name"
            if [[ ! -f "$script" ]]; then
              printf '::error::Missing local copy: %s\n' "$script"
              drift=1
            fi
          done
          if [[ $drift -eq 1 ]]; then
            printf '\nScripts have drifted. Changes must be mirrored in both:\n'
            printf '  .track/scripts/\n'
            printf '  skills/init/scaffold/track/scripts/\n'
            exit 1
          fi
          printf 'All scripts in sync.\n'
