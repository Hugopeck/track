name: Track PR Lint

on:
  pull_request:

jobs:
  pr-lint:
    name: Track PR Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint PR branch and title
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bash scripts/track-pr-lint.sh
